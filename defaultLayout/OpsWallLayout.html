<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIFA Operaciones - Muro 4 Cuadrantes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./tv-wall.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/fids-config.js"></script>
</head>
<body>
  <main class="wall-grid">
    <section class="panel" id="panel-yoy">
      <header class="panel-head">
        <h2><i class="fas fa-chart-line"></i> Comparativa YoY</h2>
        <div class="head-actions">
          <span id="yoy-years-pill" class="pill">Años: -</span>
        </div>
      </header>
      <div class="panel-body panel-scroll">
        <div class="mini-kpis" id="yoy-kpis"></div>
        <div class="chart-wrap"><canvas id="yoy-wall-chart"></canvas></div>
        <div class="table-wrap">
          <table class="table table-sm table-dark table-striped align-middle mb-0" id="yoy-wall-table">
            <thead><tr><th>Mes</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-rol">
      <header class="panel-head">
        <h2><i class="fas fa-file-pdf"></i> Rol Catorcenal</h2>
        <div class="head-actions">
          <button class="btn btn-sm btn-outline-light" id="btn-refresh-rol" title="Actualizar"><i class="fas fa-rotate"></i></button>
        </div>
      </header>
      <div class="panel-body">
        <div class="rol-meta" id="rol-meta">Sin archivo detectado.</div>
        <div class="rol-upload-tools d-none" id="rol-upload-tools">
          <input type="file" class="form-control form-control-sm" id="rol-pdf-input" accept="application/pdf">
          <button class="btn btn-sm btn-primary" id="btn-upload-rol"><i class="fas fa-upload me-1"></i>Subir PDF</button>
          <div class="small text-muted mt-1" id="rol-upload-status"></div>
        </div>
        <div class="pdf-first-page-wrap">
          <iframe id="rol-pdf-frame" title="Rol catorcenal" loading="lazy"></iframe>
        </div>
      </div>
    </section>

    <section class="panel" id="panel-notas">
      <header class="panel-head">
        <h2><i class="fas fa-note-sticky"></i> Notas Operativas</h2>
        <div class="head-actions">
          <span class="pill" id="notas-count">0 notas</span>
        </div>
      </header>
      <div class="panel-body panel-scroll">
        <div class="notes-admin-tools d-none" id="notes-admin-tools">
          <input type="text" class="form-control form-control-sm" id="nota-titulo-input" placeholder="Titulo de nota">
          <textarea class="form-control form-control-sm" id="nota-body-input" rows="2" placeholder="Escribe la nota operativa..."></textarea>
          <div class="notes-admin-row">
            <label class="small" for="nota-prioridad-input">Prioridad</label>
            <select class="form-select form-select-sm" id="nota-prioridad-input">
              <option value="3">Baja</option>
              <option value="5" selected>Media</option>
              <option value="8">Alta</option>
              <option value="10">Critica</option>
            </select>
            <button class="btn btn-sm btn-primary" id="btn-add-nota"><i class="fas fa-plus me-1"></i>Agregar nota</button>
          </div>
          <div class="small text-muted" id="nota-admin-status"></div>
        </div>
        <div id="notas-list" class="notes-list">
          <div class="empty">Sin notas activas.</div>
        </div>


      </div>
    </section>

    <section class="panel" id="panel-fids">
      <header class="panel-head">
        <h2><i id="panel-fids-icon" class="fas fa-plane-departure"></i> <span id="panel-fids-title">Tablero FIDS</span></h2>
        <div class="head-actions">
          <span class="pill d-none" id="cal-month-pill">-</span>
          <button class="btn btn-sm btn-outline-secondary d-none" id="btn-toggle-fids" title="Alternar FIDS / Calendario">
            <i class="fas fa-toggle-on"></i>
          </button>
        </div>
      </header>
      <!-- Vista FIDS -->
      <div class="panel-body" id="panel-fids-body">
        <div class="fids-no-url" id="fids-no-url-msg">
          <i class="fas fa-plane-slash"></i>
          <div>Configura la URL del tablero FIDS</div>
          <code>C:\NG-Client\pages\js\fids-config.js</code>
          <div style="font-size:.75rem;margin-top:4px">Cambia <strong>FIDS_IFRAME_URL</strong> por la URL del tablero de vuelos</div>
        </div>
        <iframe id="fids-board-frame" title="Tablero FIDS" style="display:none"></iframe>
      </div>
      <!-- Vista Calendario (oculta cuando FIDS está activo) -->
      <div class="panel-body panel-scroll d-none" id="panel-cal-body">
        <div id="route-calendar-mini" class="calendar-mini"></div>
        <h3 class="subhead">Próximas inauguraciones</h3>
        <div id="route-upcoming" class="upcoming-list"></div>
      </div>
    </section>
  </main>

  <script src="./tv-wall.js"></script>
</body>
</html>
