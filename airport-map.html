<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>Guía a tu Puerta · AIFA</title>
  <style>
    :root {
      --bg:      #05050f;
      --surface: #09091a;
      --border:  #1a2840;
      --amber:   #f0b830;
      --blue:    #2a68c0;
      --green:   #1a9060;
      --text:    #dce9f8;
      --muted:   #4a6888;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text);
           font-family: 'Segoe UI', Arial, sans-serif;
           display: flex; flex-direction: column; }

    /* ── HEADER ─────────────────────────────────────── */
    #hdr {
      display: flex; align-items: center; gap: .75rem;
      padding: .5rem 1rem;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }
    #hdr img { height: 34px; object-fit: contain; }
    #hdr-title { flex: 1; }
    #hdr-title h1 {
      font-size: .78rem; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase; color: var(--text);
    }
    #hdr-title p { font-size: .64rem; color: var(--muted); letter-spacing: .06em; }
    #gate-badge {
      background: var(--amber); color: #000;
      font-size: .85rem; font-weight: 900;
      padding: .28rem .7rem; border-radius: 7px;
      letter-spacing: .08em; text-align: center;
      min-width: 72px; flex-shrink: 0;
    }
    #gate-badge small {
      display: block; font-size: .55rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
    }

    /* ── MAIN LAYOUT ────────────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── MAP ────────────────────────────────────────── */
    #map-wrap {
      flex: 1; position: relative; overflow: hidden;
      cursor: grab;
    }
    #map-wrap:active { cursor: grabbing; }
    #asvg { width: 100%; height: 100%; display: block; }

    /* ── INFO PANEL ─────────────────────────────────── */
    #panel {
      width: 270px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }

    .panel-section {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-label {
      font-size: .62rem; color: var(--muted);
      letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: .35rem;
    }

    /* ── Walk time ── */
    #walk-row { display: flex; align-items: center; gap: .75rem; }
    #walk-icon { font-size: 1.8rem; line-height: 1; }
    #walk-mins {
      font-size: 2rem; font-weight: 900;
      color: var(--amber); line-height: 1;
    }
    #walk-unit { font-size: .65rem; color: var(--muted);
                 text-transform: uppercase; letter-spacing: .08em; }
    #walk-dist { font-size: .75rem; color: var(--muted); margin-top: .15rem; }

    /* ── Start selector ── */
    #from-sel {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: .35rem .5rem;
      border-radius: 4px; font-size: .78rem;
    }

    /* ── Directions ── */
    #dir-list { display: flex; flex-direction: column; gap: 0; }
    .dir-step {
      display: flex; align-items: flex-start; gap: .5rem;
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .dir-step:last-child { border-bottom: none; }
    .dir-n {
      background: var(--blue); color: #fff;
      border-radius: 50%; width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; flex-shrink: 0;
    }
    .dir-step.highlight .dir-n { background: var(--amber); color: #000; }
    .dir-body { font-size: .78rem; line-height: 1.45; }
    .dir-sub  { font-size: .68rem; color: var(--muted); margin-top: .15rem; }

    /* ── GPS button ── */
    #gps-btn {
      width: 100%; padding: .4rem;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); border-radius: 4px;
      cursor: pointer; font-size: .75rem;
      display: flex; align-items: center; justify-content: center; gap: .4rem;
      transition: border-color .15s, color .15s;
    }
    #gps-btn:hover { border-color: var(--blue); color: var(--text); }

    /* ── QR code ── */
    #qr-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: .4rem;
      padding: .75rem 1rem;
    }
    #qr-wrap p { font-size: .62rem; color: var(--muted);
                 letter-spacing: .06em; text-align: center; }
    #qr-box { background: #fff; padding: 7px; border-radius: 6px; display: inline-block; }

    /* ── Empty / not-found state ── */
    #state-msg {
      padding: 1.5rem 1rem; font-size: .8rem;
      color: var(--muted); line-height: 1.6;
    }

    /* ── Mobile: panel below map, vertical stack ── */
    @media (max-width: 680px) {
      html, body { overflow: hidden; }
      #main { flex-direction: column; }
      #panel {
        width: 100%; max-height: 46vh; flex-shrink: 0;
        border-left: none; border-top: 2px solid var(--border);
        flex-direction: column; overflow-y: auto;
      }
      /* compact walk-time row */
      #walk-section { padding: .45rem .75rem; }
      #walk-row { gap: .6rem; }
      #walk-icon { font-size: 1.4rem; }
      #walk-mins { font-size: 1.6rem; }
      #walk-unit { font-size: .6rem; }
      #walk-dist { font-size: .68rem; }
      /* compact from selector */
      #from-section { padding: .4rem .75rem; }
      #from-sel { font-size: .72rem; padding: .28rem .4rem; }
      /* directions scrollable */
      #dir-section { padding: .4rem .75rem; flex: 1; overflow-y: auto; }
      .dir-step { padding: .35rem 0; }
      .dir-body { font-size: .72rem; }
      .dir-sub  { font-size: .63rem; }
      /* hide QR + GPS on phone (it's the phone) */
      #qr-wrap, #gps-section { display: none; }
    }

    /* ── Pulse animation (SVG gate) ── */
    @keyframes pulse-ring {
      0%   { r: 16; opacity: .7; }
      100% { r: 30; opacity: 0; }
    }
    .pulse-ring {
      animation: pulse-ring 1.4s ease-out infinite;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <img src="images/aifa-logo.png" alt="AIFA"
       onerror="this.src='images/aifa-logo.jpg'">
  <div id="hdr-title">
    <h1>Aeropuerto Internacional Felipe Ángeles</h1>
    <p>Mapa de navegación al embarque</p>
  </div>
  <div id="gate-badge">
    <small>PUERTA</small>
    <span id="badge-gate">—</span>
  </div>
</header>

<!-- MAIN -->
<div id="main">

  <!-- SVG MAP -->
  <div id="map-wrap">
    <svg id="asvg" viewBox="0 0 1520 460"
         preserveAspectRatio="xMidYMid meet"
         xmlns="http://www.w3.org/2000/svg">
      <!-- content built by JS -->
    </svg>
  </div>

  <!-- INFO PANEL -->
  <div id="panel">

    <!-- Start location -->
    <div class="panel-section" id="from-section">
      <div class="panel-label">Punto de inicio</div>
      <select id="from-sel" onchange="applyRoute()">
        <option value="security">▶ Salida de Seguridad (acceso principal)</option>
        <option value="security-b">▶ Seguridad Internacional / Zona B</option>
        <option value="corridor-mid">▶ Centro del pasillo</option>
      </select>
    </div>

    <!-- Walk time -->
    <div class="panel-section" id="walk-section">
      <div id="walk-row">
        <div id="walk-icon">🚶</div>
        <div>
          <div id="walk-mins">—</div>
          <div id="walk-unit">minutos</div>
          <div id="walk-dist"></div>
        </div>
      </div>
    </div>

    <!-- GPS button -->
    <div class="panel-section" id="gps-section">
      <button id="gps-btn" onclick="tryGPS()">
        📍 Usar mi ubicación actual
      </button>
    </div>

    <!-- Directions -->
    <div class="panel-section" id="dir-section" style="flex:1">
      <div class="panel-label">Indicaciones</div>
      <div id="dir-list"></div>
      <div id="state-msg" style="display:none"></div>
    </div>

    <!-- QR code (to share/send to phone) -->
    <div id="qr-wrap">
      <p>Escanea para abrir en tu teléfono</p>
      <div id="qr-box"></div>
    </div>

  </div><!-- /panel -->
</div><!-- /main -->

<!-- QRCode library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
        crossorigin="anonymous"></script>

<script>
(function () {
  'use strict';

  /* ════════════════════════════════════════════════════════════
     GATE DATA — AIFA Felipe Ángeles International Airport
     Source: Wikipedia + operational data
     Concourse: 1,080 m long, 34 gates
       • 101-105  : Apron gates (south end)  — walk to aircraft
       • 106-119  : Jetbridge gates (A/B)    — telescopic jetway
       • 120-134  : Bus gates (north end)    — bus to aircraft
  ════════════════════════════════════════════════════════════ */

  // SVG coordinate system
  const CY     = 220;    // concourse corridor centre Y
  const CH     = 48;     // corridor height
  const CX0    = 90;     // corridor start X (near terminal)
  const CX1    = 1480;   // corridor end X
  const STUB   = 80;     // gate stub length (down from corridor)
  const BOXW   = 44;     // gate box width
  const BOXH   = 24;     // gate box height

  // Walking speed 75 m/min; SVG px → metres scale
  const PX2M   = 1080 / (CX1 - CX0);
  const WSPEED = 75;

  // Entry points (x along corridor)
  const ENTRIES = {
    'security':    { x: 100, label: 'Salida de Seguridad' },
    'security-b':  { x: 280, label: 'Seguridad Internacional' },
    'corridor-mid':{ x: 600, label: 'Centro del Pasillo' },
  };

  // Gate x positions (calculated once)
  function buildGateData() {
    const d = {};

    // ── Bus gates 120-134 (x = 140 … 445) ──
    for (let n = 120; n <= 134; n++) {
      d[String(n)] = {
        x: 140 + (n - 120) * 21,
        type: 'bus', gy: CY + CH / 2,
      };
    }

    // ── Jetbridge gates 106-119 (paired A/B, x = 510 … 1220) ──
    // Each gate number has an A and B position, 20 px apart; pairs 52 px apart
    const JB0 = 510, JB_STEP = 52, AB = 20;
    for (let n = 106; n <= 119; n++) {
      const base = JB0 + (n - 106) * JB_STEP;
      d[n + 'A'] = { x: base,        type: 'jetbridge', gy: CY + CH / 2 };
      d[n + 'B'] = { x: base + AB,   type: 'jetbridge', gy: CY + CH / 2 };
    }

    // ── Apron gates 101-105 (x = 1270 … 1450) ──
    for (let n = 101; n <= 105; n++) {
      d[String(n)] = {
        x: 1270 + (n - 101) * 45,
        type: 'apron', gy: CY + CH / 2,
      };
    }

    // ── Aliases / special codes ──
    d['1128'] = { ...d['112B'], alias: '112B' };  // operational alias seen in FIDS

    return d;
  }

  const GATES = buildGateData();

  // Resolve a gate string: exact, then strip trailing letter, then base number
  function resolveGate(s) {
    if (!s) return null;
    const up = s.toUpperCase().trim();
    if (GATES[up]) return { key: up, g: GATES[up] };
    // try stripping B→A variant
    const alt = up.slice(0, -1);
    if (GATES[alt]) return { key: alt, g: GATES[alt] };
    return null;
  }

  /* ════════════════════════════════════════════════════════════
     URL PARAMS
  ════════════════════════════════════════════════════════════ */
  const P   = new URLSearchParams(location.search);
  const TGT = (P.get('gate') || P.get('puerta') || '').toUpperCase();
  const VUE = P.get('vuelo') || P.get('flight') || '';
  const FRM = P.get('from')  || 'security';

  /* ════════════════════════════════════════════════════════════
     SVG BUILD
  ════════════════════════════════════════════════════════════ */
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('asvg');

  function el(tag, attrs, text) {
    const e = document.createElementNS(SVG_NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, String(v));
    if (text !== undefined) e.textContent = text;
    return e;
  }

  function buildMap() {
    // dark background
    svg.appendChild(el('rect', { x:0, y:0, width:1520, height:460, fill:'#05050f' }));

    // apron area (below corridor)
    svg.appendChild(el('rect', {
      x: CX0, y: CY + CH / 2, width: CX1 - CX0, height: 220,
      fill: '#080810',
    }));
    svg.appendChild(el('text', {
      x: CX0 + 600, y: CY + CH / 2 + 60,
      fill: '#10182a', 'font-size': 13,
      'font-family': 'Segoe UI,Arial',
      'text-anchor': 'middle', 'letter-spacing': 5,
    }, 'PLATAFORMA  /  APRON'));

    // terminal building (left block)
    svg.appendChild(el('rect', {
      x: 0, y: 60, width: 95, height: 340,
      fill: '#080818', stroke: '#1a2840', 'stroke-width': 1.5, rx: 5,
    }));
    svg.appendChild(el('text', {
      x: 47, y: 200,
      fill: '#2a4878', 'font-size': 9.5,
      'font-family': 'Segoe UI,Arial', 'text-anchor': 'middle',
      'writing-mode': 'tb', 'letter-spacing': 2,
    }, 'TERMINAL'));
    svg.appendChild(el('text', {
      x: 47, y: 235,
      fill: '#1a3050', 'font-size': 8.5,
      'font-family': 'Segoe UI,Arial', 'text-anchor': 'middle',
    }, 'Check-in'));

    // connector
    svg.appendChild(el('rect', {
      x: 78, y: CY - CH / 2 - 55, width: 28, height: 55,
      fill: '#0a1828', stroke: '#1a2840', 'stroke-width': 1.5,
    }));
    svg.appendChild(el('text', {
      x: 92, y: CY - CH / 2 - 62,
      fill: '#1a8050', 'font-size': 9,
      'font-family': 'Segoe UI,Arial', 'text-anchor': 'middle', 'letter-spacing': .5,
    }, '▼ SEGURIDAD'));

    // zone separator lines
    [[458, '#1a2840'], [490, '#1a2840'], [1240, '#1a2840'], [1255, '#1a2840']].forEach(([x, col]) => {
      svg.appendChild(el('line', {
        x1: x, y1: CY - CH / 2 - 4, x2: x, y2: CY + CH / 2 + 4,
        stroke: col, 'stroke-width': 1,
      }));
    });

    // zone labels (above corridor)
    const ZY = CY - CH / 2 - 10;
    [
      [290,  '120 – 134  PUERTAS DE AUTOBÚS'],
      [870,  '106 – 119  PUERTAS CON PASARELA (A / B)'],
      [1360, '101 – 105  ACCESO DIRECTO'],
    ].forEach(([x, t]) => {
      svg.appendChild(el('text', {
        x, y: ZY,
        fill: '#1a3050', 'font-size': 9,
        'font-family': 'Segoe UI,Arial',
        'text-anchor': 'middle', 'letter-spacing': 1.5,
      }, t));
    });

    // main corridor
    svg.appendChild(el('rect', {
      x: CX0, y: CY - CH / 2, width: CX1 - CX0, height: CH,
      fill: '#0d1b30', stroke: '#1c3460', 'stroke-width': 2, rx: 4,
    }));

    // direction arrows in corridor
    for (let ax = 180; ax < CX1 - 60; ax += 110) {
      svg.appendChild(el('text', {
        x: ax, y: CY + 6,
        fill: '#1a2840', 'font-size': 16,
        'text-anchor': 'middle',
      }, '→'));
    }

    // draw all gates
    for (const [key, g] of Object.entries(GATES)) {
      if (g.alias) continue;             // skip aliases (1128 → 112B already drawn)
      drawGate(key, g);
    }

    // path + markers group (will be cleared/redrawn)
    svg.appendChild(el('g', { id: 'path-g' }));
  }

  const GATE_COLORS = {
    bus:       { fill: '#06120a', stroke: '#0e2a16', text: '#1a5030' },
    jetbridge: { fill: '#060c1c', stroke: '#0e2040', text: '#1a3878' },
    apron:     { fill: '#121006', stroke: '#2a2010', text: '#4a3a10' },
  };

  function drawGate(key, g) {
    const gx = g.x;
    const gy0 = g.gy;                      // corridor bottom
    const gy1 = gy0 + STUB;               // stub bottom
    const c = GATE_COLORS[g.type] || GATE_COLORS.jetbridge;

    // stub line
    svg.appendChild(el('line', {
      x1: gx, y1: gy0, x2: gx, y2: gy1,
      stroke: c.stroke, 'stroke-width': g.type === 'jetbridge' ? 4 : 2.5,
    }));

    // gate box
    svg.appendChild(el('rect', {
      id: `g-box-${key}`,
      x: gx - BOXW / 2, y: gy1,
      width: BOXW, height: BOXH,
      fill: c.fill, stroke: c.stroke, 'stroke-width': 1, rx: 4,
      cursor: 'pointer',
    }));

    // gate label
    svg.appendChild(el('text', {
      id: `g-lbl-${key}`,
      x: gx, y: gy1 + BOXH / 2 + 4.5,
      fill: c.text,
      'font-size': 9, 'font-weight': 600,
      'font-family': 'Segoe UI,Arial',
      'text-anchor': 'middle', 'letter-spacing': .3,
      cursor: 'pointer',
    }, key));

    // click → navigate to this gate
    const box = document.getElementById(`g-box-${key}`);
    const lbl = document.getElementById(`g-lbl-${key}`);
    if (box) box.addEventListener('click', () => navigateTo(key));
    if (lbl) lbl.addEventListener('click', () => navigateTo(key));
  }

  /* ════════════════════════════════════════════════════════════
     ROUTING
  ════════════════════════════════════════════════════════════ */
  let _currentRAFs = [];

  function cancelAnims() {
    _currentRAFs.forEach(id => cancelAnimationFrame(id));
    _currentRAFs = [];
  }

  function applyRoute() {
    const fromKey = document.getElementById('from-sel').value;
    const entry   = ENTRIES[fromKey] || ENTRIES.security;

    cancelAnims();

    // reset gate highlight
    for (const key of Object.keys(GATES)) {
      const box = document.getElementById(`g-box-${key}`);
      const lbl = document.getElementById(`g-lbl-${key}`);
      if (!box) continue;
      const g = GATES[key];
      const c = GATE_COLORS[g.type] || GATE_COLORS.jetbridge;
      box.setAttribute('fill', c.fill);
      box.setAttribute('stroke', c.stroke);
      if (lbl) { lbl.setAttribute('fill', c.text); lbl.setAttribute('font-weight', 600); }
    }

    // clear path group
    const pg = document.getElementById('path-g');
    while (pg.firstChild) pg.removeChild(pg.firstChild);

    if (!TGT) {
      initViewBox();
      showMsg('Toca una puerta en el mapa para ver la ruta — o escanea el QR del tablero FIDS.', 'info');
      return;
    }

    const resolved = resolveGate(TGT);
    if (!resolved) {
      showMsg(`La puerta "${TGT}" es una terminal de carga o posición especial. Consulta con el personal del aeropuerto.`, 'warn');
      document.getElementById('walk-mins').textContent = '?';
      return;
    }

    const { key: gKey, g: gData } = resolved;
    const gx = gData.x;
    const ex = entry.x;

    // Highlight target gate
    const tBox = document.getElementById(`g-box-${gKey}`);
    const tLbl = document.getElementById(`g-lbl-${gKey}`);
    if (tBox) { tBox.setAttribute('fill', '#c89010'); tBox.setAttribute('stroke', '#f0b830'); }
    if (tLbl) { tLbl.setAttribute('fill', '#000'); tLbl.setAttribute('font-weight', 900); }

    // Path geometry
    const cy = CY;                            // walk along corridor Y
    const destY = gData.gy + STUB + BOXH / 2; // centre of destination gate box

    // Draw path: entry → along corridor → turn down to gate
    const pathD = `M ${ex} ${cy} L ${gx} ${cy} L ${gx} ${destY}`;

    // Shadow
    pg.appendChild(el('path', {
      d: pathD,
      stroke: '#f0b83028', 'stroke-width': 14, fill: 'none', 'stroke-linecap': 'round',
    }));

    // Animated dashed path
    const pathEl = el('path', {
      id: 'nav-line',
      d: pathD,
      stroke: '#f0b830', 'stroke-width': 3.5, fill: 'none',
      'stroke-linecap': 'round', 'stroke-dasharray': '10 6', 'stroke-dashoffset': 0,
    });
    pg.appendChild(pathEl);

    // Animate dashes
    let doff = 0;
    function animDash() {
      doff = (doff - 1.2) % 16;
      pathEl.setAttribute('stroke-dashoffset', doff);
      _currentRAFs.push(requestAnimationFrame(animDash));
    }
    animDash();

    // Start marker
    pg.appendChild(el('circle', { cx: ex, cy: cy, r: 7, fill: '#1a9060', stroke: '#0a3020', 'stroke-width': 2 }));
    pg.appendChild(el('text', { x: ex, y: cy + 4, fill: '#fff', 'font-size': 8,
                                'text-anchor': 'middle', 'pointer-events': 'none' }, '✦'));

    // Walking person animation along path
    const personCircle = el('circle', { cx: ex, cy: cy, r: 7, fill: '#3a88e8', stroke: '#0a2050', 'stroke-width': 2 });
    pg.appendChild(personCircle);
    pg.appendChild(el('text', { id: 'person-icon', x: ex, y: cy + 4, fill: '#fff', 'font-size': 9,
                                'text-anchor': 'middle', 'pointer-events': 'none' }, '🚶'));
    const personIcon = document.getElementById('person-icon');

    const totalLen = Math.abs(gx - ex) + Math.abs(destY - cy);
    const corridorLen = Math.abs(gx - ex);
    const stubLen = Math.abs(destY - cy);
    const TRIP_MS = 3200;

    let t0 = null;
    function animPerson(ts) {
      if (!t0) t0 = ts;
      const elapsed = (ts - t0) % (TRIP_MS + 600);
      const progress = Math.min(elapsed / TRIP_MS, 1);

      let px, py;
      const corridorFrac = corridorLen / totalLen;
      if (progress <= corridorFrac) {
        const p2 = progress / corridorFrac;
        px = ex + (gx - ex) * p2;
        py = cy;
      } else {
        const p2 = (progress - corridorFrac) / (1 - corridorFrac);
        px = gx;
        py = cy + (destY - cy) * p2;
      }

      personCircle.setAttribute('cx', px);
      personCircle.setAttribute('cy', py);
      personIcon.setAttribute('x', px);
      personIcon.setAttribute('y', py + 4);

      _currentRAFs.push(requestAnimationFrame(animPerson));
    }
    _currentRAFs.push(requestAnimationFrame(animPerson));

    // Destination gate pulse rings
    const pRing1 = el('circle', { cx: gx, cy: destY, r: 16, fill: 'none',
                                  stroke: '#f0b830', 'stroke-width': 2, opacity: 0, class: 'pulse-ring' });
    const pRing2 = el('circle', { cx: gx, cy: destY, r: 16, fill: 'none',
                                  stroke: '#f0b830', 'stroke-width': 1.5, opacity: 0, class: 'pulse-ring' });
    pRing2.style.animationDelay = '.7s';
    pg.appendChild(pRing1);
    pg.appendChild(pRing2);

    // Centre dot at destination
    pg.appendChild(el('circle', { cx: gx, cy: destY, r: 5, fill: '#f0b830' }));

    // Distance & walk time
    const distPx = totalLen;
    const distM  = Math.round(distPx * PX2M);
    const mins   = Math.max(1, Math.round(distM / WSPEED));
    document.getElementById('walk-mins').textContent = mins;
    document.getElementById('walk-dist').textContent = `~${distM} m de recorrido`;

    // Badge
    document.getElementById('badge-gate').textContent = TGT;
    if (VUE) {
      const badge = document.getElementById('gate-badge');
      badge.innerHTML = `<small>PUERTA / VUELO</small><span>${TGT}</span>
        <span style="font-size:.6rem;font-weight:700;opacity:.7;display:block">${VUE}</span>`;
    }

    // Directions
    buildDirections(entry, gKey, gData, distM, mins);

    // Adjust SVG viewport to show the route
    adjustView(ex, gx, destY);
  }

  // Fill the container by matching its aspect ratio in SVG units
  function getContainerAspect() {
    const wrap = document.getElementById('map-wrap');
    const cW = wrap.clientWidth  || 360;
    const cH = wrap.clientHeight || 300;
    return { cW, cH, asp: cW / Math.max(cH, 1) };
  }

  function adjustView(ex, gx, destY) {
    const { cW, asp } = getContainerAspect();
    const pad  = Math.max(60, cW * 0.08);
    const minX = Math.min(ex, gx) - pad;
    const maxX = Math.max(ex, gx) + pad;
    const vbW  = Math.max(maxX - minX, 280);
    const vbH  = Math.round(vbW / asp);
    const cx   = (minX + maxX) / 2;
    const cy   = CY + STUB * 0.4;  // slightly below corridor to show gate labels
    svg.setAttribute('viewBox', `${cx - vbW / 2} ${cy - vbH / 2} ${vbW} ${vbH}`);
  }

  function initViewBox() {
    // Show full concourse scaled to fill the container (no gate selected)
    const { asp } = getContainerAspect();
    const vbW = 1520;
    const vbH = Math.round(vbW / asp);
    svg.setAttribute('viewBox', `0 ${CY - vbH / 2} ${vbW} ${vbH}`);
  }

  function navigateTo(key) {
    // Update URL and reload to navigate to a clicked gate
    const url = new URL(location.href);
    url.searchParams.set('gate', key);
    location.href = url.toString();
  }

  function buildDirections(entry, gKey, g, distM, mins) {
    const dir = g.x > entry.x ? 'derecha ➡' : 'izquierda ⬅';
    const zoneNames = {
      bus:       'Zona de Autobuses (120-134)',
      jetbridge: 'Zona de Pasarelas (106-119)',
      apron:     'Acceso Directo a Aeronave (101-105)',
    };
    const boardHint = {
      bus:       '🚌 Abordarás por autobús a la aeronave',
      jetbridge: '🏗️ Abordarás por pasarela telescópica',
      apron:     '🚶 Abordarás caminando directamente a la aeronave',
    };

    const steps = [
      { icon: '🔓', text: `Sal de ${entry.label}` },
      { icon: '↕️', text: `Gira a la <strong>${dir}</strong> y avanza por el pasillo principal`, sub: `Zona: ${zoneNames[g.type] || g.type}` },
      { icon: '🏃', text: `Camina <strong>~${distM} m</strong>`, sub: `Tiempo estimado: ${mins} min` },
      { icon: '🎯', text: `Llega a <strong>Puerta ${gKey}</strong><br>Busca el letrero amarillo`, highlight: true },
      { icon: '✈️', text: boardHint[g.type] || 'Aborda tu vuelo' },
    ];

    document.getElementById('dir-list').innerHTML = steps.map((s, i) => `
      <div class="dir-step${s.highlight ? ' highlight' : ''}">
        <div class="dir-n">${i + 1}</div>
        <div class="dir-body">
          ${s.icon} ${s.text}
          ${s.sub ? `<div class="dir-sub">${s.sub}</div>` : ''}
        </div>
      </div>
    `).join('');

    document.getElementById('state-msg').style.display = 'none';
    document.getElementById('dir-list').style.display = '';
  }

  function showMsg(msg, type) {
    const el2 = document.getElementById('state-msg');
    el2.textContent = msg;
    el2.style.color = type === 'warn' ? '#c07c18' : '#4a6888';
    el2.style.display = '';
    document.getElementById('dir-list').style.display = 'none';
  }

  /* ════════════════════════════════════════════════════════════
     GPS (best-effort indoor)
  ════════════════════════════════════════════════════════════ */
  // AIFA terminal approximate center
  const AIFA_LAT = 19.7594, AIFA_LNG = -99.0152;
  // Rough mapping: each degree lat ≈ 111,000 m, lng ≈ 95,000 m at this lat
  // Corridor runs roughly W-E. West (CX0) ≈ lng -99.0175, East (CX1) ≈ lng -99.0132
  const LNG_WEST = -99.0180, LNG_EAST = -99.0125;

  function tryGPS() {
    const btn = document.getElementById('gps-btn');
    btn.textContent = '⏳ Localizando…';
    if (!navigator.geolocation) {
      btn.textContent = '📍 GPS no disponible';
      return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;
      const dist = Math.sqrt(
        Math.pow((latitude  - AIFA_LAT) * 111000, 2) +
        Math.pow((longitude - AIFA_LNG) * 95000,  2),
      );
      if (dist > 2000) {
        btn.textContent = '📍 Fuera del aeropuerto';
        return;
      }
      // Map longitude to corridor X
      const frac = Math.max(0, Math.min(1, (longitude - LNG_WEST) / (LNG_EAST - LNG_WEST)));
      const svgX = CX0 + frac * (CX1 - CX0);

      // Find closest entry point
      let closest = 'security', minD = Infinity;
      for (const [k, ep] of Object.entries(ENTRIES)) {
        const d = Math.abs(ep.x - svgX);
        if (d < minD) { minD = d; closest = k; }
      }

      document.getElementById('from-sel').value = closest;
      applyRoute();
      btn.textContent = `✅ Posición detectada (±${Math.round(pos.coords.accuracy)}m)`;
    }, err => {
      btn.textContent = '📍 No se pudo obtener ubicación';
    }, { enableHighAccuracy: true, timeout: 8000 });
  }

  /* ════════════════════════════════════════════════════════════
     QR CODE — encode current page URL for phone sharing
  ════════════════════════════════════════════════════════════ */
  function buildQR() {
    const box = document.getElementById('qr-box');
    box.innerHTML = '';
    try {
      new QRCode(box, {
        text: location.href,
        width: 120, height: 120,
        colorDark: '#000000', colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M,
      });
    } catch (_) {}
  }

  /* ════════════════════════════════════════════════════════════
     SVG DRAG / PAN (mouse only; touch handled by preserveAspectRatio)
  ════════════════════════════════════════════════════════════ */
  let dragging = false, dragStart = null, origVB = null;

  svg.addEventListener('mousedown', e => {
    dragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    const vb = svg.getAttribute('viewBox').split(' ').map(Number);
    origVB = { x: vb[0], y: vb[1], w: vb[2], h: vb[3] };
  });
  window.addEventListener('mousemove', e => {
    if (!dragging || !origVB) return;
    const rect = svg.getBoundingClientRect();
    const scaleX = origVB.w / rect.width;
    const scaleY = origVB.h / rect.height;
    const dx = (e.clientX - dragStart.x) * scaleX;
    const dy = (e.clientY - dragStart.y) * scaleY;
    svg.setAttribute('viewBox', `${origVB.x - dx} ${origVB.y - dy} ${origVB.w} ${origVB.h}`);
  });
  window.addEventListener('mouseup', () => { dragging = false; });

  // Reset view button
  document.getElementById('map-wrap').addEventListener('dblclick', () => {
    svg.setAttribute('viewBox', '0 0 1520 460');
    if (TGT) {
      const r = resolveGate(TGT);
      if (r) {
        const entry = ENTRIES[document.getElementById('from-sel').value] || ENTRIES.security;
        adjustView(entry.x, r.g.x, r.g.gy + STUB + BOXH / 2);
      }
    }
  });

  /* ════════════════════════════════════════════════════════════
     INIT
  ════════════════════════════════════════════════════════════ */
  buildMap();

  // Set from-select from URL param
  const fs = document.getElementById('from-sel');
  if (FRM && ENTRIES[FRM]) fs.value = FRM;

  // Initial route
  applyRoute();

  // QR code after map loads
  if (typeof QRCode !== 'undefined') {
    buildQR();
  } else {
    window.addEventListener('load', buildQR);
  }

  // Expose for inline onclick
  window.applyRoute = applyRoute;
  window.tryGPS = tryGPS;

})();
</script>
</body>
</html>
